<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CH Favorites</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #121212; 
            --tile-bg: #1e1e1e;
            --text-dim: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: #fff; font-family: -apple-system, sans-serif; padding: 30px 10px; display: flex; flex-direction: column; align-items: center; }
        
        h1 { font-size: 1.5rem; font-weight: 800; width: 100%; max-width: 340px; margin-bottom: 25px; padding-left: 5px; color: #ffffff; }
        
        .back-bar { width: 100%; max-width: 340px; margin-bottom: 20px; display: none; }
        .back-btn { background:none; border:none; color:#fff; cursor:pointer; display:flex; align-items:center; gap:4px; font-weight:600; font-size: 0.9rem; }

        /* [그리드 복구] 무조건 4열 고정 */
        #bookmarkGrid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px 10px; 
            width: 100%; 
            max-width: 340px; 
        }

        .item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            color: inherit; 
            width: 100%;
            min-width: 0; /* 텍스트 생략용 */
        }
        
        /* [아이콘 박스] 크기 10% 축소 및 꽉 차게 설정 */
        .icon-box {
            width: 100%; 
            max-width: 58px; 
            aspect-ratio: 1 / 1;
            background-color: var(--tile-bg); 
            border-radius: 16px;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; border: 1px solid #2a2a2a; position: relative;
        }

        /* [이미지 설정] 선명도 및 꽉 채우기 */
        .favicon-img {
            width: 100%; height: 100%; object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
            position: absolute; top: 0; left: 0; z-index: 2;
        }
        
        /* [GitHub 반전] 확실하게 하얀색으로 */
        .github-invert { filter: invert(1) brightness(1.5) !important; }

        /* [알파벳 대체] 배경에 깔려있다가 이미지 실패 시 보임 */
        .char-placeholder {
            font-size: 24px; font-weight: 800; color: #555;
            text-transform: uppercase; z-index: 1;
        }

        /* [텍스트] 한 줄 생략 처리 */
        .label { 
            font-size: 10px; 
            color: var(--text-dim); 
            text-align: center; 
            width: 100%; 
            margin-top: 7px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            padding: 0 4px;
        }

        .folder-icon { color: #fff; width: 26px; height: 26px; }
    </style>
</head>
<body>
    <h1>CH Favorites</h1>
    <div class="back-bar" id="backBar"><button class="back-btn" onclick="goBack()"><i data-lucide="chevron-left" size="18"></i> 뒤로</button></div>
    <div id="bookmarkGrid"></div>

    <script>
        let bookmarkData = [];
        let currentFolderStack = [];

        async function init() {
            try {
                const res = await fetch('quetta-bookmarks.html');
                const text = await res.text();
                const doc = new DOMParser().parseFromString(text, 'text/html');
                const qa = Array.from(doc.querySelectorAll('h3, dt')).find(el => el.textContent.includes('Quick Access'));
                bookmarkData = parseDL(qa.closest('dt').querySelector('dl'));
                renderGrid(bookmarkData);
            } catch (e) { document.body.innerHTML += "<p style='padding:20px; color:gray;'>파일을 찾을 수 없습니다.</p>"; }
        }

        function parseDL(dl) {
            let data = [];
            if (!dl) return data;
            dl.querySelectorAll(':scope > dt').forEach(dt => {
                const h3 = dt.querySelector(':scope > h3'), a = dt.querySelector(':scope > a');
                if (h3) data.push({ type: 'folder', name: h3.textContent.trim(), children: parseDL(dt.querySelector('dl')) });
                else if (a) data.push({ type: 'link', name: a.textContent.trim(), url: a.href, icon: a.getAttribute('ICON') });
            });
            return data;
        }

        function renderGrid(list) {
            const grid = document.getElementById('bookmarkGrid');
            grid.innerHTML = '';
            document.getElementById('backBar').style.display = currentFolderStack.length ? 'block' : 'none';
            window.scrollTo(0, 0);

            list.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                if (item.type === 'folder') {
                    div.innerHTML = `<div class="icon-box"><i data-lucide="folder" class="folder-icon"></i></div><span class="label">${item.name}</span>`;
                    div.onclick = () => { currentFolderStack.push(item); renderGrid(item.children); };
                } else {
                    const domain = new URL(item.url).hostname;
                    const char = domain.replace('www.', '').charAt(0).toUpperCase();
                    // 선명도를 위해 구글 API 128px 고화질 모드 사용
                    const iconUrl = item.icon || `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;

                    div.innerHTML = `
                        <a href="${item.url}" class="item">
                            <div class="icon-box">
                                <span class="char-placeholder">${char}</span>
                                <img class="favicon-img ${domain.includes('github.com') ? 'github-invert' : ''}" 
                                     src="${iconUrl}" onerror="this.style.display='none'">
                            </div>
                            <span class="label">${item.name}</span>
                        </a>`;
                }
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        function goBack() {
            currentFolderStack.pop();
            renderGrid(currentFolderStack.length ? currentFolderStack[currentFolderStack.length-1].children : bookmarkData);
        }

        window.onload = init;
    </script>
</body>
</html>
