<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CH Favorites</title>

<style>
:root {
    --bg: #121212;
    --tile: #1e1e1e;
    --border: #2a2a2a;
    --title: #ffd740;
    --text-dim: #9a9a9a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 10px;
    overflow-x: hidden;
}

h1 {
    color: var(--title);
    font-size: 1.4rem;
    font-weight: 800;
    max-width: 340px;
    margin: 10px auto 20px;
}

#bookmarkGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px 10px;
    max-width: 340px;
    margin: 0 auto;
}

.item {
    text-decoration: none;
    color: inherit;
    min-width: 0;
}

.icon-box {
    width: 58px;
    height: 58px;
    margin: 0 auto;
    background: var(--tile);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
}

.favicon-img {
    width: 100%;
    height: 100%;
    object-fit: contain;          /* ⭐ 선명도 핵심 */
    image-rendering: crisp-edges;
    background: var(--tile);
}

.char-placeholder {
    width: 100%;
    height: 100%;
    background: var(--tile);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
}

.label {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
</head>

<body>
<h1>CH Favorites</h1>
<div id="bookmarkGrid"></div>

<script>
function getRootDomain(host) {
    const p = host.replace(/^www\./, '').split('.');
    return p.length > 2 ? p.slice(-2).join('.') : p.join('.');
}

async function init() {
    const res = await fetch('quetta-bookmarks.html');
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'text/html');
    const qa = [...doc.querySelectorAll('h3, dt')]
        .find(el => el.textContent.includes('Quick Access'));
    const list = parseDL(qa.closest('dt').querySelector('dl'));
    render(list);
}

function parseDL(dl) {
    const arr = [];
    dl?.querySelectorAll(':scope > dt').forEach(dt => {
        const a = dt.querySelector('a');
        if (a) {
            arr.push({
                name: a.textContent.trim(),
                url: a.href,
                icon: a.getAttribute('ICON')
            });
        }
    });
    return arr;
}

function render(list) {
    const grid = document.getElementById('bookmarkGrid');
    grid.innerHTML = '';

    list.forEach(item => {
        const root = getRootDomain(new URL(item.url).hostname);
        const first = root[0].toUpperCase();

        const sources = [
            item.icon,
            `https://${root}/favicon.ico`,
            `https://${root}/apple-touch-icon.png`
        ].filter(Boolean);

        const el = document.createElement('a');
        el.className = 'item';
        el.href = item.url;

        const box = document.createElement('div');
        box.className = 'icon-box';

        const fallback = document.createElement('div');
        fallback.className = 'char-placeholder';
        fallback.textContent = first;
        box.appendChild(fallback);

        const img = document.createElement('img');
        img.className = 'favicon-img';

        let i = 0;
        img.onload = () => {
            if (img.naturalWidth < 24) return img.remove();
            fallback.remove();
        };
        img.onerror = () => {
            i++;
            if (i < sources.length) img.src = sources[i];
            else img.remove();
        };

        img.src = sources[i];
        box.appendChild(img);

        el.appendChild(box);

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = item.name;
        el.appendChild(label);

        grid.appendChild(el);
    });
}

window.onload = init;
</script>
</body>
</html>
