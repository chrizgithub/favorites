<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CH Favorites</title>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --bg: #121212;
    --tile: #1e1e1e;
    --border: #2a2a2a;
    --title: #ffd740;
    --text-dim: #9a9a9a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 10px;
    overflow-x: hidden;
}

h1 {
    color: var(--title);
    font-size: 1.4rem;
    font-weight: 800;
    max-width: 340px;
    margin: 10px auto 20px;
}

#bookmarkGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px 10px;
    max-width: 340px;
    margin: 0 auto;
}

.item {
    text-decoration: none;
    color: inherit;
    min-width: 0;
}

.icon-box {
    width: 58px;
    height: 58px;
    margin: 0 auto;
    background: var(--tile);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;               /* ⭐ 라운드 마스크 통일 */
    position: relative;
}

.favicon-img {
    width: 100%;
    height: 100%;
    object-fit: cover;              /* ⭐ 선명 */
    display: block;
}

.char-placeholder {
    width: 100%;
    height: 100%;
    background: var(--tile);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
}

.label {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
</head>

<body>
<h1>CH Favorites</h1>
<div id="bookmarkGrid"></div>

<script>
let bookmarkData = [];

function getRootDomain(hostname) {
    const parts = hostname.replace(/^www\./, '').split('.');
    return parts.length > 2
        ? parts.slice(-2).join('.')
        : parts.join('.');
}

function cacheKey(domain) {
    return `favicon-cache:${domain}`;
}

async function init() {
    const res = await fetch('quetta-bookmarks.html');
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'text/html');
    const qa = [...doc.querySelectorAll('h3, dt')]
        .find(el => el.textContent.includes('Quick Access'));
    bookmarkData = parseDL(qa.closest('dt').querySelector('dl'));
    render(bookmarkData);
}

function parseDL(dl) {
    const arr = [];
    dl?.querySelectorAll(':scope > dt').forEach(dt => {
        const a = dt.querySelector('a');
        if (a) {
            arr.push({
                name: a.textContent.trim(),
                url: a.href,
                icon: a.getAttribute('ICON')
            });
        }
    });
    return arr;
}

function render(list) {
    const grid = document.getElementById('bookmarkGrid');
    grid.innerHTML = '';

    list.forEach(item => {
        const url = new URL(item.url);
        const root = getRootDomain(url.hostname);
        const firstChar = root[0].toUpperCase();

        const cached = localStorage.getItem(cacheKey(root));

        const sources = cached ? [cached] : [
            item.icon,
            `https://${root}/favicon.ico`,
            `https://${root}/apple-touch-icon.png`,
            `https://www.google.com/s2/favicons?domain=${root}&sz=128`
        ].filter(Boolean);

        const el = document.createElement('a');
        el.className = 'item';
        el.href = item.url;

        const iconBox = document.createElement('div');
        iconBox.className = 'icon-box';

        const fallback = document.createElement('div');
        fallback.className = 'char-placeholder';
        fallback.textContent = firstChar;
        iconBox.appendChild(fallback);

        const img = document.createElement('img');
        img.className = 'favicon-img';

        let index = 0;
        img.onload = () => {
            fallback.remove();                         // ⭐ 겹침 제거
            localStorage.setItem(cacheKey(root), img.src);
        };
        img.onerror = () => {
            index++;
            if (index < sources.length) {
                img.src = sources[index];
            } else {
                img.remove();
            }
        };
        img.src = sources[index];

        iconBox.appendChild(img);

        el.appendChild(iconBox);

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = item.name;

        el.appendChild(label);
        grid.appendChild(el);
    });
}

window.onload = init;
</script>
</body>
</html>
