<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CH Favorites</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --tile-bg: #1a1a1a;
            --title-color: #FFD700;
            --text-dim: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--title-color);
            font-size: 1.6rem;
            font-weight: 800;
            width: 100%;
            max-width: 380px;
            margin-bottom: 30px;
            text-align: left;
        }

        #bookmarkGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 가로 4개 */
            gap: 15px;
            width: 100%;
            max-width: 380px;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .icon-box {
            width: 65px;
            height: 65px;
            background-color: var(--tile-bg);
            border-radius: 18px; /* 아이폰 앱 느낌의 라운딩 */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            overflow: hidden;
            transition: transform 0.1s;
            border: 1px solid #222;
        }

        .item:active .icon-box { transform: scale(0.9); }

        .favicon-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            padding: 14px; /* 파비콘이 너무 꽉 차지 않게 */
        }

        .label {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>CH Favorites</h1>
    <div id="bookmarkGrid"></div>
    <div id="status" style="color:#444; margin-top:30px; font-size:12px;"></div>

    <script>
        async function init() {
            const grid = document.getElementById('bookmarkGrid');
            const status = document.getElementById('status');

            try {
                // 1. 파일 읽기
                const response = await fetch('quetta-bookmarks.html');
                if (!response.ok) throw new Error("파일을 찾을 수 없습니다.");
                
                const rawHtml = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(rawHtml, 'text/html');

                // 2. "Quick Access" 섹션 찾기
                // 모든 요소를 순회하며 텍스트가 일치하는 부모 노드 확보
                const allElements = Array.from(doc.querySelectorAll('h3, h2, h1, dt, th, td'));
                const qaTarget = allElements.find(el => el.textContent.includes('Quick Access'));

                if (!qaTarget) {
                    status.textContent = "Quick Access 섹션을 찾지 못했습니다.";
                    return;
                }

                // 3. 해당 섹션 '이후'에 나오는 <a> 태그들만 필터링
                // 헤더가 포함된 부모 컨테이너(보통 <DT>) 또는 그 다음 형제 요소에서 링크 추출
                const parentContainer = qaTarget.closest('dt') || qaTarget.parentElement;
                const links = parentContainer.querySelectorAll('a');

                if (links.length === 0) {
                    status.textContent = "표시할 링크가 없습니다.";
                    return;
                }

                // 4. 그리드 생성
                links.forEach(link => {
                    const name = link.textContent.trim();
                    const url = link.href;
                    if (!url || url.startsWith('javascript:')) return;

                    // 구글 파비콘 API (고해상도 128px 요청)
                    const domain = new URL(url).hostname;
                    const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;

                    const anchor = document.createElement('a');
                    anchor.href = url;
                    anchor.className = 'item';
                    anchor.innerHTML = `
                        <div class="icon-box">
                            <img class="favicon-img" src="${faviconUrl}" alt="" 
                                 onerror="this.src='https://www.google.com/s2/favicons?domain=${domain}&sz=64'">
                        </div>
                        <span class="label">${name}</span>
                    `;
                    grid.appendChild(anchor);
                });

                status.style.display = 'none';

            } catch (err) {
                status.textContent = "서버 오류: quetta-bookmarks.html 파일 확인이 필요합니다.";
                console.error(err);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
