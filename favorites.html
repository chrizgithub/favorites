<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CH Favorites</title>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --bg: #121212;
    --tile: #1e1e1e;
    --border: #2a2a2a;
    --title: #ffd740;
    --text-dim: #9a9a9a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 10px;
    overflow-x: hidden;
}

h1 {
    color: var(--title);
    font-size: 1.4rem;
    font-weight: 800;
    max-width: 340px;
    margin: 10px auto 20px;
}

#bookmarkGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px 10px;
    max-width: 340px;
    margin: 0 auto;
}

.item {
    text-decoration: none;
    color: inherit;
    min-width: 0;
}

.icon-box {
    width: 58px;
    height: 58px;
    margin: 0 auto;
    background: var(--tile);
    border-radius: 16px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
}

.favicon-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    z-index: 2;
    background: var(--tile); /* 투명 방지 */
}

.char-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    background: var(--tile);
}

.label {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
</head>

<body>
<h1>CH Favorites</h1>
<div id="bookmarkGrid"></div>

<script>
let bookmarkData = [];

async function init() {
    const res = await fetch('quetta-bookmarks.html');
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'text/html');
    const qa = [...doc.querySelectorAll('h3, dt')]
        .find(el => el.textContent.includes('Quick Access'));
    bookmarkData = parseDL(qa.closest('dt').querySelector('dl'));
    render(bookmarkData);
}

function parseDL(dl) {
    const arr = [];
    dl?.querySelectorAll(':scope > dt').forEach(dt => {
        const a = dt.querySelector('a');
        if (a) {
            arr.push({
                name: a.textContent.trim(),
                url: a.href,
                icon: a.getAttribute('ICON')
            });
        }
    });
    return arr;
}

function render(list) {
    const grid = document.getElementById('bookmarkGrid');
    grid.innerHTML = '';

    list.forEach(item => {
        const domain = new URL(item.url).hostname.replace('www.', '');
        const first = domain[0].toUpperCase();

        const iconSrc =
            item.icon ||
            `https://${domain}/apple-touch-icon.png`;

        const googleFallback =
            `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;

        const el = document.createElement('a');
        el.className = 'item';
        el.href = item.url;

        el.innerHTML = `
        <div class="icon-box">
            <div class="char-placeholder">${first}</div>
            <img class="favicon-img"
                 src="${iconSrc}"
                 onerror="this.onerror=null; this.src='${googleFallback}'"
                 onload="this.previousElementSibling.remove()">
        </div>
        <div class="label">${item.name}</div>
        `;
        grid.appendChild(el);
    });
}

window.onload = init;
</script>
</body>
</html>
