<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CH Favorites</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --tile-bg: #1a1a1a;
            --title-color: #FFD700;
            --text-dim: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, sans-serif;
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--title-color);
            font-size: 1.5rem;
            font-weight: 800;
            width: 100%;
            max-width: 360px;
            margin-bottom: 25px;
            padding-left: 10px;
        }

        /* 가로 4열 그리드 강제 고정 */
        #bookmarkGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px;
            width: 100%;
            max-width: 380px;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            width: 100%;
            margin-bottom: 10px;
        }

        .icon-box {
            width: 100%; /* 그리드 칸 너비에 맞춤 */
            max-width: 70px;
            aspect-ratio: 1 / 1;
            background-color: var(--tile-bg);
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #252525;
            transition: transform 0.1s;
        }

        .item:active .icon-box { transform: scale(0.9); }

        .favicon-img { width: 100%; height: 100%; object-fit: cover; padding: 15px; }
        
        /* 폴더 아이콘 스타일 */
        .folder-icon { color: #FFD700; width: 32px; height: 32px; }

        .label {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            width: 100%;
            margin-top: 6px;
            padding: 0 4px;
            /* 긴 텍스트 생략 처리 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>CH Favorites</h1>
    <div id="bookmarkGrid"></div>
    <div id="status" style="color:#444; margin-top:50px; font-size:12px;"></div>

    <script>
        async function init() {
            const grid = document.getElementById('bookmarkGrid');
            const status = document.getElementById('status');

            try {
                const response = await fetch('quetta-bookmarks.html');
                if (!response.ok) throw new Error();
                
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');

                // 1. Quick Access 찾기
                const qaHeader = Array.from(doc.querySelectorAll('h3, h2, dt')).find(el => el.textContent.includes('Quick Access'));
                if (!qaHeader) { status.textContent = "Quick Access를 찾을 수 없습니다."; return; }

                // 2. Quick Access 하위의 DL 태그 찾기
                const parentDT = qaHeader.closest('dt');
                const subDL = parentDT.querySelector('dl');
                
                if (!subDL) { status.textContent = "하위 항목이 없습니다."; return; }

                // 3. 하위 요소들을 순회하며 폴더와 링크 구분
                // DL의 자식인 DT들을 가져옴
                const items = subDL.querySelectorAll(':scope > dt');

                items.forEach(dt => {
                    const folderTitle = dt.querySelector('h3');
                    const link = dt.querySelector('a');

                    if (folderTitle) {
                        // [서브 폴더인 경우]
                        createItem(folderTitle.textContent, "#", true);
                    } else if (link) {
                        // [일반 링크인 경우]
                        createItem(link.textContent, link.href, false);
                    }
                });

                lucide.createIcons();
                status.style.display = 'none';

            } catch (err) {
                status.textContent = "파일을 불러올 수 없습니다.";
            }
        }

        function createItem(name, url, isFolder) {
            const grid = document.getElementById('bookmarkGrid');
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.className = 'item';
            if (!isFolder) anchor.target = "_blank";

            let iconContent;
            if (isFolder) {
                // 폴더 아이콘
                iconContent = `<div class="icon-box"><i data-lucide="folder" class="folder-icon"></i></div>`;
            } else {
                // 사이트 파비콘
                const domain = new URL(url).hostname;
                const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
                iconContent = `
                    <div class="icon-box">
                        <img class="favicon-img" src="${faviconUrl}" onerror="this.src='https://www.google.com/s2/favicons?domain=${domain}&sz=64'; this.onerror=null;">
                    </div>`;
            }

            anchor.innerHTML = `
                ${iconContent}
                <span class="label">${name}</span>
            `;
            grid.appendChild(anchor);
        }

        window.onload = init;
    </script>
</body>
</html>
