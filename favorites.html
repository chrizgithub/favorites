<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CH Favorites</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #121212; 
            --tile-bg: #1e1e1e;
            --title-color: #ffffff; 
            --text-dim: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 30px 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 {
            color: var(--title-color); font-size: 1.5rem; font-weight: 800;
            width: 100%; max-width: 340px; margin-bottom: 25px; padding-left: 5px;
        }

        .back-bar { width: 100%; max-width: 340px; margin-bottom: 20px; display: none; }
        .back-btn { 
            background: none; border: none; color: #fff; font-size: 0.9rem; 
            display: flex; align-items: center; gap: 4px; cursor: pointer;
        }

        #bookmarkGrid {
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px 10px; width: 100%; max-width: 340px;
        }

        .item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit; width: 100%; min-width: 0; }

        /* 아이콘 박스 */
        .icon-box {
            width: 100%; max-width: 58px; aspect-ratio: 1 / 1;
            background-color: var(--tile-bg); border-radius: 16px;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; border: 1px solid #2a2a2a; position: relative;
        }

        /* 1. 선명도 해결: 이미지 렌더링 최적화 */
        .favicon-img {
            width: 100%; height: 100%; object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
            display: none; /* 로드 전까지 숨김 */
        }
        
        /* 2. GitHub 하얀색 반전 (확실한 필터) */
        .invert-white { filter: invert(1) brightness(100%) !important; }

        /* 3. 알파벳 아이콘 (기본 배경) */
        .char-placeholder {
            font-size: 22px; font-weight: 800; color: #555;
            text-transform: uppercase; user-select: none;
        }

        .folder-icon { color: #fff; width: 26px; height: 26px; }

        .label {
            font-size: 10px; color: var(--text-dim); text-align: center;
            width: 100%; margin-top: 7px; display: block;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 2px;
        }
    </style>
</head>
<body>

    <h1>CH Favorites</h1>
    <div class="back-bar" id="backBar"><button class="back-btn" id="backBtn"><i data-lucide="chevron-left"></i> 뒤로</button></div>
    <div id="bookmarkGrid"></div>

    <script>
        let bookmarkData = [];
        let currentFolderStack = [];

        async function init() {
            try {
                const response = await fetch('quetta-bookmarks.html');
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                // 폴더 구조 파싱
                const qaHeader = Array.from(doc.querySelectorAll('h3, dt')).find(el => el.textContent.includes('Quick Access'));
                const mainDL = qaHeader.closest('dt').querySelector('dl');
                bookmarkData = parseDL(mainDL);
                renderGrid(bookmarkData);
            } catch (err) { document.body.innerHTML += "<p style='color:red; margin-top:20px;'>파일 로드 오류</p>"; }

            document.getElementById('backBtn').onclick = () => {
                currentFolderStack.pop();
                renderGrid(currentFolderStack.length > 0 ? currentFolderStack[currentFolderStack.length-1].children : bookmarkData);
            };
        }

        function parseDL(dl) {
            let data = [];
            if (!dl) return data;
            dl.querySelectorAll(':scope > dt').forEach(dt => {
                const h3 = dt.querySelector(':scope > h3');
                const a = dt.querySelector(':scope > a');
                if (h3) {
                    data.push({ type: 'folder', name: h3.textContent.trim(), children: parseDL(dt.querySelector('dl')) });
                } else if (a) {
                    data.push({ type: 'link', name: a.textContent.trim(), url: a.href, icon: a.getAttribute('ICON') });
                }
            });
            return data;
        }

        function renderGrid(dataList) {
            const grid = document.getElementById('bookmarkGrid');
            const backBar = document.getElementById('backBar');
            grid.innerHTML = '';
            window.scrollTo(0, 0);
            backBar.style.display = currentFolderStack.length > 0 ? 'block' : 'none';

            dataList.forEach(item => {
                const el = document.createElement('div');
                el.className = 'item';
                
                if (item.type === 'folder') {
                    el.innerHTML = `<div class="icon-box"><i data-lucide="folder" class="folder-icon"></i></div><span class="label">${item.name}</span>`;
                    el.onclick = () => { currentFolderStack.push(item); renderGrid(item.children); };
                } else {
                    const domain = new URL(item.url).hostname;
                    const cleanDomain = domain.replace('www.', '');
                    const firstChar = cleanDomain.charAt(0);
                    const isGithub = domain.includes('github.com');
                    
                    // 우선순위: 1. 북마크 내장 ICON, 2. DuckDuckGo (선명함), 3. Google 고화질
                    const iconUrl = item.icon || `https://icons.duckduckgo.com/ip3/${domain}.ico`;

                    el.innerHTML = `
                        <a href="${item.url}" target="_self" class="item">
                            <div class="icon-box">
                                <span class="char-placeholder">${firstChar}</span>
                                <img class="favicon-img ${isGithub ? 'invert-white' : ''}" 
                                     src="${iconUrl}" 
                                     onload="handleLoad(this)"
                                     onerror="handleError(this, '${domain}')">
                            </div>
                            <span class="label">${item.name}</span>
                        </a>`;
                }
                grid.appendChild(el);
            });
            lucide.createIcons();
        }

        function handleLoad(img) {
            // 이미지 로드 성공 시 알파벳 숨기고 이미지 표시
            img.style.display = 'block';
            if(img.previousElementSibling) img.previousElementSibling.style.display = 'none';
        }

        function handleError(img, domain) {
            // DuckDuckGo 실패 시 Google 고화질로 2차 시도
            if (!img.dataset.triedGoogle) {
                img.dataset.triedGoogle = "true";
                img.src = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
            } else {
                // 둘 다 실패하면 그냥 알파벳 유지 (이미지 숨김 유지)
                img.style.display = 'none';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
