<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CH Favorites</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --tile-bg: #1a1a1a;
            --title-color: #FFD700;
            --text-dim: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--title-color);
            font-size: 1.6rem;
            font-weight: 800;
            width: 100%;
            max-width: 380px;
            margin-bottom: 30px;
            text-align: left;
        }

        #bookmarkGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 380px;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .icon-box {
            width: 65px;
            height: 65px;
            background-color: var(--tile-bg);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            overflow: hidden;
            transition: transform 0.1s;
        }

        .item:active .icon-box { transform: scale(0.9); }

        /* 파비콘 스타일 */
        .favicon-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            padding: 12px; /* 아이콘이 너무 꽉 차지 않게 여백 */
        }

        /* 이미지가 없는 경우 보일 기본 아이콘 */
        .backup-icon { color: #555; width: 24px; height: 24px; }

        .label {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>CH Favorites</h1>
    <div id="bookmarkGrid"></div>
    <div id="status" style="color:#555; margin-top:20px;"></div>

    <script>
        async function loadBookmarks() {
            const grid = document.getElementById('bookmarkGrid');
            const status = document.getElementById('status');

            try {
                const response = await fetch('quetta-bookmarks.html');
                if (!response.ok) throw new Error("파일 로드 실패");

                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');

                // 1. "Quick Access" 텍스트를 포함한 헤더 찾기
                const headers = Array.from(doc.querySelectorAll('h3, h2, h1, dt'));
                const qaHeader = headers.find(h => h.textContent.trim().includes('Quick Access'));

                if (!qaHeader) {
                    status.textContent = "Quick Access 섹션을 찾을 수 없습니다.";
                    return;
                }

                // 2. 해당 헤더 바로 다음에 오는 링크 컨테이너(DL)에서 <a>만 모두 추출
                // 보통 구조: <DT><H3>Quick Access</H3><DL>...</DL></DT>
                let links = [];
                let nextEl = qaHeader.nextElementSibling;
                
                // 만약 바로 다음 요소가 없으면 부모로 올라가서 찾음 (브라우저마다 파싱 구조가 다름)
                if (!nextEl || nextEl.tagName !== 'DL') {
                    nextEl = qaHeader.parentElement.querySelector('dl');
                }

                if (nextEl) {
                    links = Array.from(nextEl.querySelectorAll('a'));
                } else {
                    // 최후의 수단: 헤더 이후의 모든 링크 중 다음 헤더가 나오기 전까지 추출
                    let sibling = qaHeader.nextElementSibling;
                    while (sibling && !['H1','H2','H3'].includes(sibling.tagName)) {
                        const foundLinks = sibling.querySelectorAll('a');
                        foundLinks.forEach(l => links.push(l));
                        sibling = sibling.nextElementSibling;
                    }
                }

                if (links.length === 0) {
                    status.textContent = "Quick Access 폴더가 비어있습니다.";
                    return;
                }

                links.forEach(link => {
                    const name = link.textContent.trim();
                    const url = link.href;
                    // 고해상도 파비콘 서비스 이용 (128px)
                    const faviconUrl = `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=128`;

                    const item = document.createElement('a');
                    item.href = url;
                    item.className = 'item';
                    item.innerHTML = `
                        <div class="icon-box">
                            <img class="favicon-img" src="${faviconUrl}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            <div class="backup-icon" style="display:none;"><i data-lucide="link"></i></div>
                        </div>
                        <span class="label">${name}</span>
                    `;
                    grid.appendChild(item);
                });

                lucide.createIcons();

            } catch (err) {
                status.textContent = "에러: quetta-bookmarks.html 파일이나 서버 상태를 확인하세요.";
            }
        }

        window.onload = loadBookmarks;
    </script>
</body>
</html>
