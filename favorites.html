<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChRiZ Favorites</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --bg-color: #121212;
    --tile-bg: #1e1e1e;
    --title-color: #c9920a;
    --text-dim: #9a9a9a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: var(--bg-color);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

h1 {
    color: var(--title-color);
    font-size: 1.4rem;
    font-weight: 800;
    width: 100%;
    max-width: 340px;
    margin: 10px 0 20px;
    padding-left: 5px;
}

.back-bar {
    width: 100%;
    max-width: 340px;
    margin-bottom: 20px;
    display: none;
}

.back-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
}

#bookmarkGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px 10px;
    width: 100%;
    max-width: 340px;
}

.item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: inherit;
    width: 100%;
    min-width: 0;
}

.icon-box {
    width: 58px;
    height: 58px;
    background: var(--tile-bg);
    border-radius: 16px;
    border: 1px solid #2a2a2a;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.favicon-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    z-index: 2;
}

.github-invert {
    filter: invert(1) brightness(2);
}

.char-placeholder {
    width: 100%;
    height: 100%;
    font-size: 22px;
    font-weight: 800;
    display: flex;
    justify-content: center;
    align-items: center;
    text-transform: uppercase;
    background: var(--tile-bg);
    color: #ffffff;
    z-index: 1;
}

.label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    width: 100%;
    text-align: center;

    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    white-space: normal;
    word-break: break-word;
}

.folder-icon {
    width: 26px;
    height: 26px;
    color: #fff;
}
</style>
</head>

<body>
<h1>ChRiZ Favorites</h1>

<div class="back-bar" id="backBar">
    <button class="back-btn" onclick="goBack()">
        <i data-lucide="chevron-left" size="18"></i> 뒤로
    </button>
</div>

<div id="bookmarkGrid"></div>

<script>
let bookmarkData = [];
let currentFolderStack = [];

/* 🔹 상위 도메인 추출 */
function getRootDomain(hostname) {
    const parts = hostname.replace(/^www\./, '').split('.');
    return parts.length > 2
        ? parts.slice(-2).join('.')
        : parts.join('.');
}

function faviconKey(domain) {
    return `favicon-ok:${domain}`;
}

/* 🔹 파비콘 정상 로드시 알파벳 제거 */
function checkFavicon(img, domain) {
    if (img.naturalWidth < 24 || img.naturalHeight < 24) {
        localStorage.setItem(faviconKey(domain), '0');
        img.remove();
    } else {
        localStorage.setItem(faviconKey(domain), '1');
        const placeholder = img.previousElementSibling;
        if (placeholder && placeholder.classList.contains('char-placeholder')) {
            placeholder.remove();
        }
    }
}

async function init() {
    try {
        const res = await fetch('1.html');
        const text = await res.text();
        const doc = new DOMParser().parseFromString(text, 'text/html');
        const qa = Array.from(doc.querySelectorAll('h3, dt'))
            .find(el => el.textContent.includes('Quick Access'));
        bookmarkData = parseDL(qa.closest('dt').querySelector('dl'));
        renderGrid(bookmarkData);
    } catch {
        document.body.innerHTML += '<p style="color:gray">로딩 실패</p>';
    }
}

function parseDL(dl) {
    const data = [];
    if (!dl) return data;

    dl.querySelectorAll(':scope > dt').forEach(dt => {
        const h3 = dt.querySelector(':scope > h3');
        const a = dt.querySelector(':scope > a');
        if (h3) {
            const name = h3.textContent.trim();
            if (['즐겨찾기', '플레이리스트'].includes(name)) return;
            data.push({
                type: 'folder',
                name,
                children: parseDL(dt.querySelector('dl'))
            });
        } else if (a) {
            const name = a.textContent.trim();
            if (['즐겨찾기', '플레이리스트'].includes(name)) return;
            data.push({ type: 'link', name, url: a.href });
        }
    });
    return data;
}

function renderGrid(list) {
    const grid = document.getElementById('bookmarkGrid');
    const backBar = document.getElementById('backBar');
    grid.innerHTML = '';
    backBar.style.display = currentFolderStack.length ? 'block' : 'none';

    list.forEach(item => {
        const wrapper = document.createElement('div');

        if (item.type === 'folder') {
            wrapper.className = 'item';
            wrapper.innerHTML = `
                <div class="icon-box">
                    <i data-lucide="folder" class="folder-icon"></i>
                </div>
                <span class="label">${item.name}</span>`;
            wrapper.onclick = () => {
                currentFolderStack.push(item);
                renderGrid(item.children);
            };
        } else {
            const host = new URL(item.url).hostname;
            const domain = getRootDomain(host);
            const firstChar = domain[0].toUpperCase();

            const ok = localStorage.getItem(faviconKey(domain));
            const appleIcon = `https://${domain}/apple-touch-icon.png`;
            const googleIcon = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;

            wrapper.innerHTML = `
            <a href="${item.url}" class="item">
                <div class="icon-box">
                    <div class="char-placeholder">${firstChar}</div>
                    ${ok !== '0' ? `
                    <img class="favicon-img ${domain.includes('github.com') ? 'github-invert' : ''}"
                         src="${appleIcon}"
                         onerror="this.src='${googleIcon}'"
                         onload="checkFavicon(this, '${domain}')">` : ''}
                </div>
                <span class="label">${item.name}</span>
            </a>`;
        }
        grid.appendChild(wrapper);
    });
    lucide.createIcons();
}

function goBack() {
    currentFolderStack.pop();
    renderGrid(
        currentFolderStack.length
            ? currentFolderStack[currentFolderStack.length - 1].children
            : bookmarkData
    );
}

window.onload = init;
</script>
</body>
</html>
