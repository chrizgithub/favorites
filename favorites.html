<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CH Favorites</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #121212; 
            --tile-bg: #1e1e1e;
            --title-color: #ffffff; 
            --text-dim: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--title-color);
            font-size: 1.5rem;
            font-weight: 800;
            width: 100%;
            max-width: 340px;
            margin-bottom: 25px;
            padding-left: 5px;
        }

        .back-bar {
            width: 100%;
            max-width: 340px;
            text-align: left;
            padding: 10px 10px 20px 10px;
            display: none;
        }

        .back-btn {
            background: none; border: none; color: #fff;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 4px;
        }

        #bookmarkGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px 8px;
            width: 100%;
            max-width: 340px;
        }

        .item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: inherit; width: 100%; min-width: 0;
        }

        .icon-box {
            width: 100%;
            max-width: 58px; 
            aspect-ratio: 1 / 1;
            background-color: var(--tile-bg);
            border-radius: 16px;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        /* 아이콘 선명도 강제 향상 */
        .favicon-img {
            width: 100%; height: 100%; object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        
        /* GitHub 전용 반전 필터 */
        .invert-white {
            filter: invert(1) brightness(2);
        }

        /* 알파벳 대체 아이콘 */
        .char-icon {
            font-size: 24px; font-weight: 800;
            color: #ffffff; text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .folder-icon { color: #fff; width: 26px; height: 26px; }

        .label {
            font-size: 10px; color: var(--text-dim); text-align: center;
            width: 100%; margin-top: 7px; display: block;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            padding: 0 3px;
        }
    </style>
</head>
<body>

    <h1>CH Favorites</h1>
    <div class="back-bar" id="backBar"><button class="back-btn" id="backBtn"><i data-lucide="chevron-left"></i> 뒤로</button></div>
    <div id="bookmarkGrid"></div>

    <script>
        let bookmarkData = [];
        let currentFolderStack = [];

        async function init() {
            try {
                const response = await fetch('quetta-bookmarks.html');
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const qaHeader = Array.from(doc.querySelectorAll('h3, dt')).find(el => el.textContent.includes('Quick Access'));
                const mainDL = qaHeader.closest('dt').querySelector('dl');
                bookmarkData = parseDL(mainDL);
                renderGrid(bookmarkData);
            } catch (err) { console.error("Load Error"); }

            document.getElementById('backBtn').onclick = () => {
                currentFolderStack.pop();
                renderGrid(currentFolderStack.length > 0 ? currentFolderStack[currentFolderStack.length-1].children : bookmarkData);
            };
        }

        function parseDL(dl) {
            let data = [];
            if (!dl) return data;
            dl.querySelectorAll(':scope > dt').forEach(dt => {
                const h3 = dt.querySelector(':scope > h3');
                const a = dt.querySelector(':scope > a');
                if (h3) {
                    data.push({ type: 'folder', name: h3.textContent.trim(), children: parseDL(dt.querySelector('dl')) });
                } else if (a) {
                    data.push({ type: 'link', name: a.textContent.trim(), url: a.href, icon: a.getAttribute('ICON') });
                }
            });
            return data;
        }

        function renderGrid(dataList) {
            const grid = document.getElementById('bookmarkGrid');
            const backBar = document.getElementById('backBar');
            grid.innerHTML = '';
            window.scrollTo(0, 0);
            backBar.style.display = currentFolderStack.length > 0 ? 'block' : 'none';

            dataList.forEach(item => {
                const el = document.createElement('div');
                el.className = 'item';
                
                if (item.type === 'folder') {
                    el.innerHTML = `<div class="icon-box"><i data-lucide="folder" class="folder-icon"></i></div><span class="label">${item.name}</span>`;
                    el.onclick = () => { currentFolderStack.push(item); renderGrid(item.children); };
                } else {
                    const domain = new URL(item.url).hostname;
                    // Google의 새로운 고화질 파비콘 서비스 주소로 변경
                    const highResFavicon = `https://www.google.com/s2/favicons?domain=${domain}&sz=256`;
                    const isGithub = domain.includes('github.com');

                    el.innerHTML = `
                        <a href="${item.url}" target="_self" class="item">
                            <div class="icon-box">
                                <img class="favicon-img ${isGithub ? 'invert-white' : ''}" 
                                     src="${item.icon || highResFavicon}" 
                                     onload="this.style.opacity=1"
                                     onerror="handleIconError(this, '${domain}')">
                            </div>
                            <span class="label">${item.name}</span>
                        </a>`;
                }
                grid.appendChild(el);
            });
            lucide.createIcons();
        }

        function handleIconError(img, domain) {
            // 이미 알파벳으로 변환된 경우 중복 실행 방지
            if (img.dataset.failed) return;
            img.dataset.failed = "true";

            const parent = img.parentElement;
            img.style.display = 'none';
            
            const firstChar = domain.replace('www.', '').charAt(0).toUpperCase();
            const charDiv = document.createElement('div');
            charDiv.className = 'char-icon';
            charDiv.textContent = firstChar;
            parent.appendChild(charDiv);
        }

        window.onload = init;
    </script>
</body>
</html>
