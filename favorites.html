<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CH Favorites</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --bg-color: #121212;
    --tile-bg: #1e1e1e;
    --title-color: #ffd740;
    --text-dim: #9a9a9a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: var(--bg-color);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

h1 {
    color: var(--title-color);
    font-size: 1.4rem;
    font-weight: 800;
    width: 100%;
    max-width: 340px;
    margin: 10px 0 20px;
    padding-left: 5px;
}

.back-bar {
    width: 100%;
    max-width: 340px;
    margin-bottom: 20px;
    display: none;
}

.back-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
}

#bookmarkGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px 10px;
    width: 100%;
    max-width: 340px;
}

.item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: inherit;
    width: 100%;
    min-width: 0;
}

.icon-box {
    width: 58px;
    height: 58px;
    background: var(--tile-bg);
    border-radius: 16px;
    border: 1px solid #2a2a2a;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.favicon-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    z-index: 2;
    /* 업스케일 시 선명도 유지 */
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
}

/* 작은 아이콘(16~32px)은 픽셀 뭉개짐 방지를 위해 패딩+contain */
.favicon-img.small-icon {
    object-fit: contain;
    padding: 10px;
    image-rendering: pixelated;
}

.github-invert {
    filter: invert(1) brightness(2);
}

.char-placeholder {
    width: 100%;
    height: 100%;
    font-size: 22px;
    font-weight: 800;
    display: flex;
    justify-content: center;
    align-items: center;
    text-transform: uppercase;
    background: var(--tile-bg);
    color: #ffffff;
    z-index: 1;
}

.label {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    width: 100%;
    text-align: center;

    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    white-space: normal;
    word-break: break-word;
}

.folder-icon {
    width: 26px;
    height: 26px;
    color: #fff;
}
</style>
</head>

<body>
<h1>CH Favorites</h1>

<div class="back-bar" id="backBar">
    <button class="back-btn" onclick="goBack()">
        <i data-lucide="chevron-left" size="18"></i> 뒤로
    </button>
</div>

<div id="bookmarkGrid"></div>

<script>
let bookmarkData = [];
let currentFolderStack = [];

/* ── 도메인 추출 ── */
function getRootDomain(hostname) {
    const parts = hostname.replace(/^www\./, '').split('.');
    return parts.length > 2 ? parts.slice(-2).join('.') : parts.join('.');
}

/* ── 캐시 키 ── */
const CACHE_VER = 'v2:';                          // 버전 올려 낡은 캐시 자동 무시
function cacheKey(domain) { return `fav:${CACHE_VER}${domain}`; }

/* ── 소스 순서 (고화질 → 범용) ── */
function faviconSources(domain) {
    return [
        `https://${domain}/apple-touch-icon.png`,
        `https://${domain}/apple-touch-icon-precomposed.png`,
        `https://logo.clearbit.com/${domain}`,                                      // 로고 (고화질 PNG)
        `https://www.google.com/s2/favicons?domain=${domain}&sz=128`,               // Google 128px
        `https://t1.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON` +
            `&fallback_opts=TYPE,SIZE,URL&url=https://${domain}&size=128`,          // Google V2
        `https://icons.duckduckgo.com/ip3/${domain}.ico`,                           // DuckDuckGo
        `https://${domain}/favicon.png`,
        `https://${domain}/favicon.ico`,
    ];
}

/* ── 이미지 한 장 로드 테스트 (Promise) ── */
function tryLoad(src, minSize = 16) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        // CORS 없이 로드 (display only)
        img.onload = () => {
            if (img.naturalWidth >= minSize && img.naturalHeight >= minSize) {
                resolve({ src, w: img.naturalWidth, h: img.naturalHeight });
            } else {
                reject(new Error('too small'));
            }
        };
        img.onerror = () => reject(new Error('load error'));
        img.src = src;
    });
}

/* ── Waterfall: 성공하는 첫 번째 소스 사용 ── */
async function resolveFavicon(domain) {
    const cached = localStorage.getItem(cacheKey(domain));
    if (cached) {
        try {
            return JSON.parse(cached);          // { src, w, h }
        } catch { /* 손상 캐시 무시 */ }
    }

    const sources = faviconSources(domain);

    for (const src of sources) {
        try {
            // apple-touch-icon 등 고화질 소스는 24px 이상 요구
            // ico/favicon 등 후반부 소스는 16px도 허용
            const minSize = src.includes('favicon') ? 16 : 24;
            const result = await tryLoad(src, minSize);
            localStorage.setItem(cacheKey(domain), JSON.stringify(result));
            return result;
        } catch { /* 다음 소스 시도 */ }
    }

    localStorage.setItem(cacheKey(domain), JSON.stringify(null));
    return null;
}

/* ── 아이콘 박스에 이미지 주입 ── */
function applyFavicon(iconBox, domain, result) {
    if (!result) return;                        // 모든 소스 실패 → 알파벳 유지

    const placeholder = iconBox.querySelector('.char-placeholder');
    const img = document.createElement('img');
    img.className = 'favicon-img';
    if (domain.includes('github.com')) img.classList.add('github-invert');

    // 작은 아이콘(≤32px)은 contain + padding으로 선명하게
    if (result.w <= 32 || result.h <= 32) img.classList.add('small-icon');

    img.src = result.src;
    iconBox.appendChild(img);

    if (placeholder) placeholder.remove();
}

/* ── 초기화 ── */
async function init() {
    try {
        const res = await fetch('quetta-bookmarks.html');
        const text = await res.text();
        const doc = new DOMParser().parseFromString(text, 'text/html');
        const qa = Array.from(doc.querySelectorAll('h3, dt'))
            .find(el => el.textContent.includes('Quick Access'));
        bookmarkData = parseDL(qa.closest('dt').querySelector('dl'));
        renderGrid(bookmarkData);
    } catch {
        document.body.innerHTML += '<p style="color:gray">로딩 실패</p>';
    }
}

function parseDL(dl) {
    const data = [];
    if (!dl) return data;
    dl.querySelectorAll(':scope > dt').forEach(dt => {
        const h3 = dt.querySelector(':scope > h3');
        const a  = dt.querySelector(':scope > a');
        if (h3) {
            data.push({ type: 'folder', name: h3.textContent.trim(), children: parseDL(dt.querySelector('dl')) });
        } else if (a) {
            data.push({ type: 'link', name: a.textContent.trim(), url: a.href });
        }
    });
    return data;
}

function renderGrid(list) {
    const grid    = document.getElementById('bookmarkGrid');
    const backBar = document.getElementById('backBar');
    grid.innerHTML = '';
    backBar.style.display = currentFolderStack.length ? 'block' : 'none';

    list.forEach(item => {
        const wrapper = document.createElement('div');

        if (item.type === 'folder') {
            wrapper.className = 'item';
            wrapper.innerHTML = `
                <div class="icon-box">
                    <i data-lucide="folder" class="folder-icon"></i>
                </div>
                <span class="label">${item.name}</span>`;
            wrapper.onclick = () => {
                currentFolderStack.push(item);
                renderGrid(item.children);
            };
        } else {
            let host, domain;
            try {
                host   = new URL(item.url).hostname;
                domain = getRootDomain(host);
            } catch { return; }

            const firstChar = domain[0].toUpperCase();

            wrapper.innerHTML = `
            <a href="${item.url}" class="item">
                <div class="icon-box">
                    <div class="char-placeholder">${firstChar}</div>
                </div>
                <span class="label">${item.name}</span>
            </a>`;

            const iconBox = wrapper.querySelector('.icon-box');

            // 캐시에 이미 있으면 즉시 표시, 없으면 비동기 로드
            const cached = localStorage.getItem(cacheKey(domain));
            if (cached) {
                try {
                    const result = JSON.parse(cached);
                    if (result) applyFavicon(iconBox, domain, result);
                } catch { /* 무시 */ }
            } else {
                resolveFavicon(domain).then(result => applyFavicon(iconBox, domain, result));
            }
        }
        grid.appendChild(wrapper);
    });
    lucide.createIcons();
}

function goBack() {
    currentFolderStack.pop();
    renderGrid(
        currentFolderStack.length
            ? currentFolderStack[currentFolderStack.length - 1].children
            : bookmarkData
    );
}

window.onload = init;
</script>
</body>
</html>
