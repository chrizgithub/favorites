<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CH Favorites</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* 5. 배경색 변경: 아주 어두운 회색 */
            --bg-color: #121212; 
            --tile-bg: #1e1e1e; /* 아이콘 박스 배경색 */
            --title-color: #ffffff; 
            --text-dim: #999999;
            --folder-color: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--title-color);
            font-size: 1.5rem;
            font-weight: 800;
            width: 100%;
            max-width: 340px;
            margin-bottom: 25px;
            padding-left: 5px;
        }

        .back-bar {
            width: 100%;
            max-width: 340px;
            text-align: left;
            padding: 10px 10px 20px 10px;
            display: none;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--title-color);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #bookmarkGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px 8px; /* 간격 축소 */
            width: 100%;
            max-width: 340px; /* 전체 너비 축소 */
            margin-top: 20px;
        }

        h1 + #bookmarkGrid { margin-top: 30px; }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            width: 100%;
            min-width: 0;
            cursor: pointer;
        }

        .icon-box {
            width: 100%;
            /* 1. 아이콘 크기 약 10% 축소: max-width 조정 */
            max-width: 58px; 
            aspect-ratio: 1 / 1;
            background-color: var(--tile-bg);
            border-radius: 16px; /* 둥글기 살짝 조정 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: transform 0.1s;
        }

        .item:active .icon-box { transform: scale(0.92); }

        .favicon-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: -webkit-optimize-contrast; /* 2. 선명도 향상 CSS */
            image-rendering: crisp-edges;
        }
        
        /* Github 등 검은색 아이콘 반전 (4번 해결) */
        .invert-icon {
            filter: invert(1) brightness(2); /* 흰색으로 반전 후 밝기 조정 */
        }

        /* 3. 알파벳 대체 아이콘 스타일 */
        .char-icon {
            font-size: 24px;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
        }

        .folder-icon { color: var(--folder-color); width: 26px; height: 26px; }

        .label {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            width: 100%;
            margin-top: 7px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 3px;
        }

        .loading-status { color: #555; margin-top: 50px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>CH Favorites</h1>
    
    <div class="back-bar" id="backBar">
        <button class="back-btn" id="backBtn">
            <i data-lucide="chevron-left" size="18"></i> 뒤로
        </button>
    </div>

    <div id="bookmarkGrid"></div>
    <div id="status" class="loading-status"></div>

    <script>
        let bookmarkData = []; // 최상위 데이터
        let currentFolderStack = []; // 뒤로 가기 추적용 스택

        async function init() {
            const status = document.getElementById('status');
            try {
                status.textContent = "데이터 불러오는 중...";
                const response = await fetch('quetta-bookmarks.html');
                if (!response.ok) throw new Error();
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');

                const qaHeader = Array.from(doc.querySelectorAll('h3, h2, h1, dt')).find(el => el.textContent.includes('Quick Access'));
                if (!qaHeader) { status.textContent = "Quick Access 폴더 없음"; return; }

                const parentDT = qaHeader.closest('dt');
                const mainDL = parentDT.querySelector('dl');

                bookmarkData = parseDL(mainDL);
                renderGrid(bookmarkData); // 최상위 목록 그리기
                status.style.display = 'none';
            } catch (err) {
                status.textContent = "파일을 찾을 수 없습니다.";
            }

            // 뒤로 가기 버튼 이벤트 등록
            document.getElementById('backBtn').onclick = function() {
                if (currentFolderStack.length > 0) {
                    currentFolderStack.pop(); // 현재 폴더를 스택에서 제거
                    const prevData = currentFolderStack.length > 0 ? currentFolderStack[currentFolderStack.length - 1].children : bookmarkData;
                    renderGrid(prevData); 
                }
            };
        }

        function parseDL(dl) {
            let data = [];
            if (!dl) return data;
            const dts = dl.querySelectorAll(':scope > dt');
            dts.forEach(dt => {
                const h3 = dt.querySelector(':scope > h3');
                const a = dt.querySelector(':scope > a');
                const nextDL = dt.querySelector(':scope > dl');

                if (h3 && nextDL) {
                    data.push({ type: 'folder', name: h3.textContent.trim(), children: parseDL(nextDL) });
                } else if (a) {
                    // [2. 선명도 향상] 북마크 파일 내부의 ICON 속성(고해상도 데이터 URL) 우선 추출
                    data.push({ type: 'link', name: a.textContent.trim(), url: a.href, icon: a.getAttribute('ICON') });
                }
            });
            return data;
        }

        function renderGrid(dataList) {
            const grid = document.getElementById('bookmarkGrid');
            const backBar = document.getElementById('backBar');
            grid.innerHTML = ''; // 기존 목록 초기화

            // 폴더 전환 시 화면 맨 위로 스크롤
            window.scrollTo({ top: 0, behavior: 'instant' }); 

            // 뒤로 가기 바 표시 여부 결정
            if (currentFolderStack.length > 0) {
                backBar.style.display = 'block';
                grid.style.marginTop = '0';
            } else {
                backBar.style.display = 'none';
                grid.style.marginTop = '20px';
            }

            dataList.forEach(item => {
                const el = document.createElement('div');
                el.className = 'item';
                
                if (item.type === 'folder') {
                    // 폴더 아이콘 스타일 수정: 흰색 실루엣 느낌
                    el.innerHTML = `
                        <div class="icon-box"><i data-lucide="folder" class="folder-icon"></i></div>
                        <span class="label">${item.name}</span>
                    `;
                    el.onclick = () => {
                        currentFolderStack.push(item); // 현재 폴더를 스택에 추가
                        renderGrid(item.children); // 자식 목록 그리기
                    };
                } else {
                    const domain = new URL(item.url).hostname;
                    // [2 & 3. 선명도 & 대체] 3중 안전장치 파비콘 로직
                    // 1순위: 북마크 파일 내부 ICON 데이터 (고해상도)
                    // 2순위: DuckDuckGo 고해상도 API
                    // 3순위: 알파벳 대체 아이콘
                    let faviconUrl = item.icon || `https://icons.duckduckgo.com/ip3/${domain}.ico`;
                    
                    // [4. Github 검은색 아이콘 해결] 특정 도메인 아이콘 반전 처리
                    let imgClass = "favicon-img";
                    if (domain.includes('github.com')) imgClass += " invert-icon";

                    el.innerHTML = `
                        <a href="${item.url}" target="_self" class="item" style="margin-bottom:0">
                            <div class="icon-box">
                                <img class="${imgClass}" src="${faviconUrl}" onerror="handleFaviconError(this, '${domain}')">
                            </div>
                            <span class="label">${item.name}</span>
                        </a>
                    `;
                }
                grid.appendChild(el);
            });
            lucide.createIcons();
        }

        // Favicon 로드 실패 시 대체 로직 (최종 안전장치)
        function handleFaviconError(img, domain) {
            if (img.src.includes('quetta-bookmarks.html') || img.complete) return; // 이미 ICON 데이터로 로드된 경우 패스

            if (img.src.includes('duckduckgo')) {
                // DuckDuckGo 실패 시 구글 고해상도 API로 2차 시도
                img.src = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
            } else if (img.src.includes('sz=128')) {
                // 구글 고해상도 실패 시 구글 일반 API로 3차 시도
                img.src = `https://www.google.com/s2/favicons?domain=${domain}`;
            } else {
                // [3. 알파벳 대체 아이콘] 모든 이미지 로드 실패 시 도메인의 첫 글자 표시
                img.style.display = 'none';
                const char = domain.charAt(0).toUpperCase();
                const charDiv = document.createElement('div');
                charDiv.className = 'char-icon';
                charDiv.textContent = char;
                img.parentElement.appendChild(charDiv);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
