<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CH Favorites</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --tile-bg: #111111; /* 폰 아이콘 배경색 */
            --title-color: #FFD700;
            --text-dim: #888888;
            --icon-size: 60px; /* 폰 아이콘 크기 고정 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--title-color);
            font-size: 1.6rem;
            font-weight: 800;
            width: 100%;
            max-width: 360px;
            margin-bottom: 35px;
            text-align: left;
            padding-left: 5px;
        }

        /* 가로 4개 그리드 설정 */
        #bookmarkGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; /* 간격 축소 */
            width: 100%;
            max-width: 360px; /* 모바일에 맞게 제한 */
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        /* 폰 아이콘 박스 크기 최적화 */
        .icon-box {
            width: var(--icon-size);
            height: var(--icon-size);
            background-color: var(--tile-bg);
            border-radius: 15px; /* 폰 아이콘 모서리 곡률 */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            overflow: hidden; /* 이미지 넘침 방지 */
            transition: transform 0.1s, background-color 0.2s;
        }

        /* 파비콘 이미지 스타일 */
        .favicon-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지를 박스에 꽉 채움 */
            display: block;
        }

        /* 이미지 오류 시 보여줄 백업 아이콘 스타일 */
        .backup-icon {
            width: 24px;
            height: 24px;
            stroke-width: 1.5px;
            color: #efefef;
        }

        .item:active .icon-box {
            transform: scale(0.9);
            background-color: #222;
        }

        .label {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
        }

        .loading { color: var(--text-dim); font-size: 0.9rem; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>CH Favorites</h1>

    <div id="bookmarkGrid">
        </div>

    <div id="status" class="loading">불러오는 중...</div>

    <script>
        const FILE_NAME = 'quetta-bookmarks.html';

        async function init() {
            const grid = document.getElementById('bookmarkGrid');
            const status = document.getElementById('status');

            try {
                const response = await fetch(FILE_NAME);
                if (!response.ok) throw new Error();

                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');

                // Quick Access 섹션 파싱 로직
                const allHeadings = Array.from(doc.querySelectorAll('h1, h2, h3, h4, dt'));
                const target = allHeadings.find(el => el.textContent.includes('Quick Access'));

                if (!target) {
                    status.textContent = "Quick Access 폴더를 찾을 수 없습니다.";
                    return;
                }

                // 폴더 구조에 따라 다음 형제나 부모 내부에서 A 태그 검색
                const container = target.tagName === 'DT' ? target.nextElementSibling : target.nextElementSibling;
                const links = (container || target.parentElement).querySelectorAll('a');

                if (links.length === 0) {
                    status.textContent = "링크가 없습니다.";
                    return;
                }

                status.style.display = 'none';

                links.forEach(link => {
                    const name = link.textContent.trim();
                    const url = link.href;

                    // 파비콘 URL 가져오기 (1순위: HTML 속성, 2순위: Google API)
                    let faviconUrl = link.getAttribute('ICON'); // Netscape 표준 북마크 형식에서 추출
                    if (!faviconUrl || faviconUrl.startsWith('data:')) {
                        // 만약 ICON 속성이 없거나 data URI라면 Google의 파비콘 캐시 API 사용
                        faviconUrl = `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=128`;
                    }
                    
                    const anchor = document.createElement('a');
                    anchor.href = url;
                    anchor.className = 'item';
                    anchor.target = "_blank"; // 새 탭에서 열기
                    anchor.innerHTML = `
                        <div class="icon-box">
                            <img class="favicon-img" src="${faviconUrl}" alt="${name}" onerror="handleImageError(this)">
                        </div>
                        <span class="label">${name}</span>
                    `;
                    grid.appendChild(anchor);
                });

                lucide.createIcons();

            } catch (e) {
                status.textContent = "파일을 읽을 수 없습니다. (서버 실행 확인)";
            }
        }

        // 이미지 로딩 실패 시 루사이드 아이콘으로 대체하는 함수
        function handleImageError(img) {
            img.parentElement.innerHTML = '<i data-lucide="link-2" class="backup-icon"></i>';
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
