<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CH Favorites</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --tile-bg: #1a1a1a;
            --title-color: #FFD700;
            --text-dim: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, sans-serif;
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }

        h1 {
            color: var(--title-color);
            font-size: 1.5rem;
            font-weight: 800;
            width: 100%;
            max-width: 380px;
            margin-bottom: 25px;
            padding-left: 10px;
        }

        /* 그리드 영역: 화면 너비를 넘지 않도록 강제 */
        #bookmarkGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px 10px;
            width: 100%;
            max-width: 380px;
            table-layout: fixed; /* 레이아웃 고정 효과 */
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            width: 100%;
            min-width: 0; /* 중요: 자식 요소의 텍스트 생략을 위해 필요 */
            cursor: pointer;
        }

        .icon-box {
            width: 100%; /* 부모 너비에 맞춤 */
            max-width: 65px;
            aspect-ratio: 1 / 1;
            background-color: var(--tile-bg);
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #222;
        }

        .favicon-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            padding: 12px;
        }
        
        .folder-icon { color: #FFD700; width: 30px; height: 30px; }

        /* 텍스트 강제 줄임 설정 */
        .label {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            width: 100%; /* 부모 너비 100% 사용 */
            margin-top: 8px;
            display: block; /* 블록 요소화 */
            white-space: nowrap; /* 한 줄로 고정 */
            overflow: hidden; /* 넘치는 부분 숨김 */
            text-overflow: ellipsis; /* 끝에 ... 표시 */
        }

        .loading-status { color: #444; margin-top: 50px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>CH Favorites</h1>
    <div id="bookmarkGrid"></div>
    <div id="status" class="loading-status"></div>

    <script>
        let bookmarkData = [];

        async function init() {
            const status = document.getElementById('status');
            try {
                const response = await fetch('quetta-bookmarks.html');
                if (!response.ok) throw new Error();
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');

                const qaHeader = Array.from(doc.querySelectorAll('h3, h2, h1, dt')).find(el => el.textContent.includes('Quick Access'));
                if (!qaHeader) { status.textContent = "Quick Access 폴더 없음"; return; }

                const parentDT = qaHeader.closest('dt');
                const mainDL = parentDT.querySelector('dl');

                bookmarkData = parseDL(mainDL);
                renderGrid(bookmarkData);
                status.style.display = 'none';
            } catch (err) {
                status.textContent = "파일을 찾을 수 없습니다.";
            }
        }

        function parseDL(dl) {
            let data = [];
            if (!dl) return data;
            const dts = dl.querySelectorAll(':scope > dt');
            dts.forEach(dt => {
                const h3 = dt.querySelector(':scope > h3');
                const a = dt.querySelector(':scope > a');
                const nextDL = dt.querySelector(':scope > dl');

                if (h3 && nextDL) {
                    data.push({ type: 'folder', name: h3.textContent.trim(), children: parseDL(nextDL) });
                } else if (a) {
                    data.push({ type: 'link', name: a.textContent.trim(), url: a.href });
                }
            });
            return data;
        }

        function renderGrid(dataList) {
            const grid = document.getElementById('bookmarkGrid');
            grid.innerHTML = '';

            dataList.forEach(item => {
                const el = document.createElement('div');
                el.className = 'item';
                
                if (item.type === 'folder') {
                    el.innerHTML = `
                        <div class="icon-box"><i data-lucide="folder" class="folder-icon"></i></div>
                        <span class="label">${item.name}</span>
                    `;
                    el.onclick = () => renderGrid(item.children);
                } else {
                    const domain = new URL(item.url).hostname;
                    el.innerHTML = `
                        <a href="${item.url}" target="_blank" class="item" style="margin-bottom:0">
                            <div class="icon-box">
                                <img class="favicon-img" src="https://www.google.com/s2/favicons?domain=${domain}&sz=128" onerror="this.src='https://www.google.com/s2/favicons?domain=${domain}&sz=64'">
                            </div>
                            <span class="label">${item.name}</span>
                        </a>
                    `;
                }
                grid.appendChild(el);
            });
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
